<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voice Support Bot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f12;
      --surface: #161a1f;
      --surface2: #1e2329;
      --border: rgba(255,255,255,0.07);
      --text: #e8eaed;
      --text-muted: #8a909a;
      --accent: #3b82f6;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
      --radius: 12px;
    }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    header {
      width: 100%;
      max-width: 700px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .logo { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }

    .status-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-muted);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 12px;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); transition: background 0.3s, box-shadow 0.3s; }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.error { background: var(--red); }

    /* Single column layout */
    .main-layout {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Chat column ── */
    .chat-col { display: flex; flex-direction: column; }

    .messages {
      display: flex; flex-direction: column; gap: 16px;
      min-height: 400px; max-height: 400px;
      overflow-y: auto; padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message { display: flex; gap: 10px; animation: msgIn 0.2s ease-out; }
    .message.user { flex-direction: row-reverse; }
    @keyframes msgIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; flex-shrink: 0;
    }
    .message.user .avatar { background: var(--accent); color: #fff; }
    .message.bot  .avatar { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

    .bubble {
      max-width: 72%; padding: 10px 14px; border-radius: 10px;
      font-size: 14px; line-height: 1.6;
    }
    .message.user .bubble { background: var(--accent); color: #fff; border-radius: 10px 2px 10px 10px; }
    .message.bot  .bubble { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 2px 10px 10px 10px; }

    .bubble.typing span {
      display: inline-block; width: 5px; height: 5px; border-radius: 50%;
      background: var(--text-muted); animation: bounce 1.2s infinite;
    }
    .bubble.typing span:nth-child(2) { animation-delay: 0.2s; }
    .bubble.typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    /* ── Controls panel ── */
    .controls {
      background: var(--surface2); border: 1px solid var(--border);
      border-top: none; border-radius: 0 0 var(--radius) var(--radius);
      padding: 16px 20px; display: flex; flex-direction: column; gap: 14px;
    }

    .visualizer-wrap { display: flex; align-items: center; justify-content: center; gap: 3px; height: 32px; }
    .bar { width: 3px; background: var(--accent); border-radius: 2px; transition: height 0.08s ease; opacity: 0.7; }

    .mic-row { display: flex; align-items: center; justify-content: center; gap: 16px; }

    .mic-btn {
      width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--border);
      background: var(--surface); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; color: var(--text);
    }
    .mic-btn:hover { border-color: var(--accent); }
    .mic-btn.recording { background: rgba(239,68,68,0.1); border-color: var(--red); color: var(--red); animation: pulse-ring 1.5s infinite; }
    .mic-btn svg { width: 24px; height: 24px; }
    @keyframes pulse-ring { 0%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)} 70%{box-shadow:0 0 0 14px rgba(239,68,68,0)} 100%{box-shadow:0 0 0 0 rgba(239,68,68,0)} }

    .mic-label { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 5px; }
    .mic-wrap { display: flex; flex-direction: column; align-items: center; }

    .end-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 20px;
      border: 1px solid var(--red); background: rgba(239,68,68,0.08);
      color: var(--red); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
    }
    .end-btn:hover { background: rgba(239,68,68,0.18); }
    .end-btn svg { width: 14px; height: 14px; }
    .end-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .side-btn {
      width: 38px; height: 38px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .side-btn:hover { border-color: var(--accent); color: var(--accent); }
    .side-btn svg { width: 16px; height: 16px; }

    .metrics { display: flex; gap: 8px; justify-content: center; }
    .metric {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 10px; min-width: 70px;
    }
    .metric-val { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent); }
    .metric-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

    /* ── Slot panel — below chat ── */
    .slot-col {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .slot-col-title {
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text-muted);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* Grid for slot items */
    .slot-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .slot-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 10px; border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      transition: border-color 0.3s;
    }
    .slot-item.filled  { border-color: rgba(34,197,94,0.3); }
    .slot-item.missing { border-color: rgba(245,158,11,0.25); }

    .slot-icon {
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; flex-shrink: 0; margin-top: 1px;
    }
    .slot-item.filled  .slot-icon { background: rgba(34,197,94,0.15); color: var(--green); }
    .slot-item.missing .slot-icon { background: rgba(245,158,11,0.15); color: var(--amber); }
    .slot-item.optional .slot-icon { background: var(--surface); color: var(--text-muted); }

    .slot-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .slot-label { font-size: 11px; color: var(--text-muted); }
    .slot-value { font-size: 13px; color: var(--text); word-break: break-word; }
    .slot-value.empty { color: var(--text-muted); font-style: italic; font-size: 12px; }

    .slot-complete-banner {
      display: none;
      align-items: center; gap: 6px;
      padding: 8px 10px; border-radius: 8px;
      background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
      font-size: 12px; color: var(--green); font-weight: 500;
    }
    .slot-complete-banner.show { display: flex; }

    /* Session bar */
    .session-bar {
      width: 100%; max-width: 700px; margin-top: 12px;
      display: flex; align-items: center; gap: 10px;
      font-size: 12px; color: var(--text-muted);
    }
    .session-id {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 3px 8px;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 18px;
      font-size: 13px; color: var(--text);
      opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: var(--red); color: var(--red); }
    .toast.success { border-color: var(--green); color: var(--green); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Support Assistant
  </div>
  <div class="status-badge">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Disconnected</span>
  </div>
</header>

<div class="main-layout">

  <!-- Chat + controls -->
  <div class="chat-col">
    <div class="messages" id="messages"></div>

    <div class="controls">
      <div class="visualizer-wrap" id="visualizer"></div>

      <div class="mic-row">
        <button class="side-btn" id="mute-btn" title="Mute / unmute playback">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
        </button>

        <div class="mic-wrap">
          <button class="mic-btn" id="mic-btn" title="Click to talk">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8"  y1="23" x2="16" y2="23"/>
            </svg>
          </button>
          <div class="mic-label" id="mic-label">Click to talk</div>
        </div>

        <button class="end-btn" id="end-btn" title="End call and save details">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.42 19.42 0 0 1 4.43 9.6a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.34 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.32 9.9"/>
            <line x1="23" y1="1" x2="1" y2="23"/>
          </svg>
          End Call
        </button>
      </div>

      <div class="metrics">
        <div class="metric"><span class="metric-val" id="m-asr">—</span><span class="metric-label">ASR ms</span></div>
        <div class="metric"><span class="metric-val" id="m-llm">—</span><span class="metric-label">LLM ms</span></div>
        <div class="metric"><span class="metric-val" id="m-tts">—</span><span class="metric-label">TTS ms</span></div>
        <div class="metric"><span class="metric-val" id="m-total">—</span><span class="metric-label">Total ms</span></div>
      </div>
    </div>
  </div>



</div>

<div class="session-bar">
  <span>Session:</span>
  <span class="session-id" id="session-id">—</span>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Config ───────────────────────────────────────────────────────
const WS_URL = 'wss://bot.groveops.net/ws';
const SAMPLE_RATE = 16000;

// ─── State ────────────────────────────────────────────────────────
let ws = null;
let mediaStream = null;
let audioContext = null;
let processor = null;
let analyser = null;
let recording = false;
let muted = false;
let sessionId = crypto.randomUUID().slice(0, 8);
let turnStart = null, asrStart = null, llmStart = null, ttsStart = null;
const audioQueue = [];
let playbackActive = false;

// ─── DOM ──────────────────────────────────────────────────────────
const micBtn    = document.getElementById('mic-btn');
const micLabel  = document.getElementById('mic-label');
const muteBtn   = document.getElementById('mute-btn');
const endBtn    = document.getElementById('end-btn');
const messages  = document.getElementById('messages');
const statusDot = document.getElementById('status-dot');
const statusTxt = document.getElementById('status-text');
const vizEl     = document.getElementById('visualizer');
const toast     = document.getElementById('toast');
document.getElementById('session-id').textContent = sessionId;

// ─── Visualizer ───────────────────────────────────────────────────
const NUM_BARS = 28;
const bars = [];
for (let i = 0; i < NUM_BARS; i++) {
  const b = document.createElement('div');
  b.className = 'bar';
  b.style.height = '4px';
  vizEl.appendChild(b);
  bars.push(b);
}
function updateViz(data) {
  const step = Math.floor(data.length / NUM_BARS);
  bars.forEach((b, i) => {
    const v = data[i * step] / 255;
    b.style.height = Math.max(4, v * 32) + 'px';
    b.style.opacity = 0.4 + v * 0.6;
  });
}
function resetViz() { bars.forEach(b => { b.style.height = '4px'; b.style.opacity = '0.4'; }); }

// ─── Toast ────────────────────────────────────────────────────────
function showToast(msg, type = '') {
  toast.textContent = msg;
  toast.className = 'toast show' + (type ? ` ${type}` : '');
  setTimeout(() => { toast.className = 'toast'; }, 3000);
}

// ─── WebSocket ────────────────────────────────────────────────────
function connect() {
  ws = new WebSocket(`${WS_URL}/${sessionId}`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setStatus('connected', 'Connected');
    showToast('Connected');
    ws.send(JSON.stringify({ type: 'bot_start' }));
  };
  ws.onclose = () => { setStatus('', 'Disconnected'); setTimeout(connect, 3000); };
  ws.onerror = () => { setStatus('error', 'Error'); showToast('Connection error', 'error'); };

  ws.onmessage = (evt) => {
    if (typeof evt.data === 'string') {
      handleControl(JSON.parse(evt.data));
    } else {
      handleAudioChunk(evt.data);
    }
  };
}

function handleControl(msg) {
  switch (msg.type) {
    case 'asr_result':
      appendMessage('user', msg.text);
      asrStart && updateMetric('m-asr', Date.now() - asrStart);
      llmStart = Date.now();
      showTyping();
      break;

    case 'llm_sentence':
      if (llmStart) { updateMetric('m-llm', Date.now() - llmStart); llmStart = null; }
      ttsStart = Date.now();
      appendBotText(msg.text);
      break;

    case 'turn_end':
      ttsStart  && updateMetric('m-tts',   Date.now() - ttsStart);
      turnStart && updateMetric('m-total', Date.now() - turnStart);
      turnStart = null;
      removeTyping();
      break;

    case 'session_ended':
      if (msg.slots) renderSlots(msg.slots);
      showToast('Call ended — details saved', 'success');
      endBtn.disabled = true;
      micBtn.disabled = true;
      break;

    case 'error':
      showToast(msg.message, 'error');
      removeTyping();
      break;
  }
}

// ─── Slot rendering ───────────────────────────────────────────────
const REQUIRED_SLOTS = ['customer_name', 'phone_number', 'issue_summary'];

function renderSlots(slots) {
  Object.entries(slots).forEach(([key, value]) => {
    const item = document.getElementById(`slot-${key}`);
    const valEl = document.getElementById(`val-${key}`);
    if (!item || !valEl) return;

    if (value && value !== null) {
      item.className = 'slot-item filled';
      item.querySelector('.slot-icon').textContent = '✓';
      valEl.textContent = value;
      valEl.className = 'slot-value';
    } else if (REQUIRED_SLOTS.includes(key)) {
      item.className = 'slot-item missing';
      item.querySelector('.slot-icon').textContent = '○';
      valEl.textContent = 'Not collected';
      valEl.className = 'slot-value empty';
    }
  });

  const allFilled = REQUIRED_SLOTS.every(k => slots[k] && slots[k] !== null);
  if (allFilled) {
    document.getElementById('slot-complete-banner').classList.add('show');
  }
}

// ─── Audio playback ───────────────────────────────────────────────
function handleAudioChunk(buffer) {
  if (muted) return;
  audioQueue.push(buffer);
  if (!playbackActive) drainQueue();
}

async function drainQueue() {
  if (!audioQueue.length) { playbackActive = false; return; }
  playbackActive = true;
  const ctx = getAudioCtx();
  const int16 = new Int16Array(audioQueue.shift());
  const f32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) f32[i] = int16[i] / 32768;
  const buf = ctx.createBuffer(1, f32.length, SAMPLE_RATE);
  buf.copyToChannel(f32, 0);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);
  src.onended = drainQueue;
  src.start();
}

function getAudioCtx() {
  if (!audioContext || audioContext.state === 'closed') {
    audioContext = new AudioContext({ sampleRate: SAMPLE_RATE });
  }
  return audioContext;
}

// ─── Microphone ───────────────────────────────────────────────────
async function startRecording() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: {
      sampleRate: SAMPLE_RATE, channelCount: 1,
      echoCancellation: true, noiseSuppression: true, autoGainControl: true
    }});
  } catch {
    showToast('Microphone access denied', 'error'); return;
  }

  const ctx = getAudioCtx();
  const source = ctx.createMediaStreamSource(mediaStream);
  analyser = ctx.createAnalyser();
  analyser.fftSize = 64;
  source.connect(analyser);

  processor = ctx.createScriptProcessor(4096, 1, 1);
  source.connect(processor);
  processor.connect(ctx.destination);

  const vizData = new Uint8Array(analyser.frequencyBinCount);

  processor.onaudioprocess = (e) => {
    if (!recording) return;
    analyser.getByteFrequencyData(vizData);
    updateViz(vizData);
    const f32 = e.inputBuffer.getChannelData(0);
    const i16 = new Int16Array(f32.length);
    for (let i = 0; i < f32.length; i++) {
      i16[i] = Math.max(-32768, Math.min(32767, f32[i] * 32768));
    }
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(i16.buffer);
  };

  recording = true;
  turnStart = Date.now();
  asrStart = Date.now();
  micBtn.classList.add('recording');
  micLabel.textContent = 'Listening...';
}

function stopRecording() {
  recording = false;
  micBtn.classList.remove('recording');
  micLabel.textContent = 'Click to talk';
  resetViz();
  if (processor)    { processor.disconnect(); processor = null; }
  if (analyser)     { analyser.disconnect();  analyser  = null; }
  if (mediaStream)  { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'end_of_audio' }));
  }
}

// ─── Mic button ───────────────────────────────────────────────────
micBtn.addEventListener('click', () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) { showToast('Not connected', 'error'); return; }
  if (recording) {
    stopRecording();
  } else {
    audioQueue.length = 0;
    playbackActive = false;
    startRecording();
  }
});

// ─── End Call button ──────────────────────────────────────────────
endBtn.addEventListener('click', async () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) { showToast('Not connected', 'error'); return; }
  if (recording) stopRecording();
  audioQueue.length = 0;
  playbackActive = false;
  ws.send(JSON.stringify({ type: 'end_session' }));
  endBtn.disabled = true;
  showToast('Ending call — extracting details...');
});

// ─── Mute ─────────────────────────────────────────────────────────
muteBtn.addEventListener('click', () => {
  muted = !muted;
  muteBtn.style.color = muted ? 'var(--red)' : '';
  muteBtn.style.borderColor = muted ? 'var(--red)' : '';
  showToast(muted ? 'Audio muted' : 'Audio unmuted');
});

// ─── Message helpers ──────────────────────────────────────────────
function appendMessage(role, text) {
  removeTyping();
  const div = document.createElement('div');
  const isUser = role === 'user';
  const isSystem = role === 'bot-system';
  div.className = `message ${isUser ? 'user' : 'bot'}`;
  div.innerHTML = `
    <div class="avatar">${isUser ? 'You' : 'AI'}</div>
    <div class="bubble" style="${isSystem ? 'opacity:0.6;font-style:italic;font-size:13px' : ''}">${escHtml(text)}</div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

let botBubble = null;
function appendBotText(text) {
  removeTyping();
  if (!botBubble) {
    const div = document.createElement('div');
    div.className = 'message bot';
    div.innerHTML = `<div class="avatar">AI</div><div class="bubble" id="active-bubble"></div>`;
    messages.appendChild(div);
    botBubble = document.getElementById('active-bubble');
    botBubble.removeAttribute('id');
  }
  botBubble.textContent += (botBubble.textContent ? ' ' : '') + text;
  messages.scrollTop = messages.scrollHeight;

  // Auto-end call when bot says goodbye
  const farewells = ['have a great day', 'have a good day', 'goodbye', 'take care', 'good day'];
  const lower = text.toLowerCase();
  if (farewells.some(f => lower.includes(f)) && !endBtn.disabled) {
    setTimeout(() => endBtn.click(), 1500); // small delay so audio finishes
  }
}

let typingEl = null;
function showTyping() {
  if (typingEl) return;
  botBubble = null;
  typingEl = document.createElement('div');
  typingEl.className = 'message bot';
  typingEl.innerHTML = `<div class="avatar">AI</div><div class="bubble typing"><span></span><span></span><span></span></div>`;
  messages.appendChild(typingEl);
  messages.scrollTop = messages.scrollHeight;
}
function removeTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }

function updateMetric(id, ms) { document.getElementById(id).textContent = ms.toFixed(0); }
function setStatus(cls, text) {
  statusDot.className = 'status-dot' + (cls ? ` ${cls}` : '');
  statusTxt.textContent = text;
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

connect();
</script>
</body>
</html>
